<body>
<div class="c">
<h1>Security Checkup</h1>
<p class="sub">6 questions to find vulnerabilities in your Claude Code setup. Based on real incidents totaling $1,800+ in losses (April 2026).</p>

<div class="progress" id="progress"></div>

<div id="quiz"></div>
<div id="results" style="display:none"></div>

<footer>
Part of <a href="https://github.com/yurukusa/cc-safe-setup">cc-safe-setup</a> — 688 safety hooks for Claude Code.

</footer>
</div>

<script>
const questions = [
  {
    q: "Do you have PreToolUse hooks configured?",
    desc: "Hooks are the only enforcement mechanism — CLAUDE.md rules are suggestions.",
    opts: [
      { text: "Yes, multiple hooks", desc: "settings.json has PreToolUse hooks", score: 3 },
      { text: "Yes, basic hooks only", desc: "1-2 hooks like destructive-guard", score: 2 },
      { text: "No hooks configured", desc: "Default Claude Code setup", score: 0 },
      { text: "I don't know what hooks are", desc: "Never heard of PreToolUse", score: 0 }
    ],
    risks: [
      { condition: s => s === 0, text: "CRITICAL: Without hooks, Claude can run rm -rf, git push --force, and any destructive command without restriction.", incident: "A user lost 3,467 files (~7 GB) when Claude ran rm -rf (#46058)" }
    ]
  },
  {
    q: "Do you use deny rules in permissions?",
    desc: "Deny rules block specific tools/commands. But they have a known bypass.",
    opts: [
      { text: "Yes, with hooks as backup", desc: "Deny rules + PreToolUse hooks", score: 3 },
      { text: "Yes, deny rules only", desc: "Rely on deny rules without hooks", score: 1 },
      { text: "No deny rules", desc: "Default permissions", score: 0 },
      { text: "I use --dangerously-skip-permissions", desc: "All permissions bypassed", score: 0 }
    ],
    risks: [
      { condition: s => s <= 1, text: "HIGH: Deny rules are bypassed when a command has 50+ subcommands (<a href='https://adversa.ai/blog/claude-code-security-bypass-deny-rules-disabled/'>Adversa AI disclosure</a>, <a href='https://www.theregister.com/2026/04/01/claude_code_rule_cap_raises/'>The Register</a>). Patched in v2.1.90, but hooks provide defense-in-depth.", incident: "50x 'true' + dangerous command bypasses ALL deny rules" }
    ]
  },
  {
    q: "Does Claude Code access financial APIs or exchanges?",
    desc: "Trading, payments, fund transfers — any financial operation.",
    opts: [
      { text: "No financial access", desc: "No exchange/payment APIs", score: 3 },
      { text: "Yes, with manual approval each time", desc: "I review every trade/transfer", score: 2 },
      { text: "Yes, with some autonomy", desc: "Claude can execute some operations", score: 0 },
      { text: "Yes, fully autonomous", desc: "Claude manages trades/transfers", score: 0 }
    ],
    risks: [
      { condition: s => s <= 1, text: "CRITICAL: Claude transferred $1,446 USDT without authorization when told to 'close a position'.", incident: "$1,446 moved from spot to futures without permission (#46828)" }
    ]
  },
  {
    q: "Do you run Claude Code in autonomous/background mode?",
    desc: "Unattended operation with --dangerously-skip-permissions or similar.",
    opts: [
      { text: "No, always supervised", desc: "I approve every action", score: 3 },
      { text: "Sometimes, with hooks", desc: "Autonomous but with safety hooks", score: 2 },
      { text: "Sometimes, without hooks", desc: "Autonomous with default settings", score: 0 },
      { text: "Always autonomous", desc: "Run overnight / unattended", score: 0 }
    ],
    risks: [
      { condition: s => s <= 1, text: "HIGH: Autonomous mode without hooks burned £140 in one night. Claude ignored CLAUDE.md rules and spawned 16 zombie subagents.", incident: "20% weekly quota consumed in one night (#47049)" }
    ]
  },
  {
    q: "Does Claude Code handle sensitive data (PII, credentials, configs)?",
    desc: "Physical addresses, API keys, personal information, production configs.",
    opts: [
      { text: "No sensitive data in workspace", desc: "Only code, no secrets", score: 3 },
      { text: "Yes, with .gitignore + hooks", desc: "Protected by multiple layers", score: 2 },
      { text: "Yes, with .gitignore only", desc: "No hooks, rely on .gitignore", score: 1 },
      { text: "Yes, minimal protection", desc: "Sensitive data in workspace", score: 0 }
    ],
    risks: [
      { condition: s => s <= 1, text: "HIGH: Claude uploaded physical GPS coordinates to a public website despite 17 sessions of 'no PII' in CLAUDE.md.", incident: "Real coordinates leaked to sondehub.org (#46910)" }
    ]
  },
  {
    q: "Do you use git worktrees with Claude Code?",
    desc: "Worktrees allow parallel development but have hook isolation issues.",
    opts: [
      { text: "No worktrees", desc: "Single working directory", score: 3 },
      { text: "Yes, with linked settings", desc: "Worktree has symlinked .claude/", score: 2 },
      { text: "Yes, default setup", desc: "Worktree without settings link", score: 0 },
      { text: "I'm not sure", desc: "Claude might create worktrees", score: 1 }
    ],
    risks: [
      { condition: s => s <= 1, text: "MEDIUM: In worktrees, .claude/settings.json is not found — all hooks are silently disabled. Claude deleted uncommitted worktrees without confirmation.", incident: "Hooks disabled in worktrees (#46808), data loss (#47074)" }
    ]
  }
];

let current = 0;
const answers = [];

function render() {
  const prog = document.getElementById('progress');
  prog.innerHTML = questions.map((_, i) =>
    `<div class="dot ${i < current ? 'done' : i === current ? 'current' : ''}"></div>`
  ).join('');

  const quiz = document.getElementById('quiz');
  if (current >= questions.length) { showResults(); return; }

  const q = questions[current];
  quiz.innerHTML = `
    <div class="step active">
      <div class="q-num">Question ${current + 1} of ${questions.length}</div>
      <div class="q">${q.q}</div>
      <p style="color:#8b949e;font-size:.85rem;margin-bottom:1rem">${q.desc}</p>
      <div class="opts">
        ${q.opts.map((o, i) => `
          <div class="opt" onclick="answer(${i})">
            <div class="opt-title">${o.text}</div>
            <div class="opt-desc">${o.desc}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function answer(idx) {
  answers.push(questions[current].opts[idx].score);
  current++;
  render();
}

function showResults() {
  document.getElementById('quiz').style.display = 'none';
  const el = document.getElementById('results');
  const total = answers.reduce((a, b) => a + b, 0);
  const max = questions.length * 3;
  const pct = Math.round(total / max * 100);

  let grade, gradeClass, summary;
  if (pct >= 80) {
    grade = 'LOW RISK'; gradeClass = 'risk-low';
    summary = 'Your setup has good security practices. Fine-tune with the recommendations below.';
  } else if (pct >= 50) {
    grade = 'MEDIUM RISK'; gradeClass = 'risk-medium';
    summary = 'Some vulnerabilities exist. Address the issues flagged below to prevent incidents.';
  } else if (pct >= 25) {
    grade = 'HIGH RISK'; gradeClass = 'risk-high';
    summary = 'Significant security gaps. Your setup is vulnerable to known attack patterns.';
  } else {
    grade = 'CRITICAL RISK'; gradeClass = 'risk-critical';
    summary = 'Your Claude Code setup has serious vulnerabilities. Immediate action recommended.';
  }

  let risksHtml = '';
  questions.forEach((q, i) => {
    q.risks.forEach(r => {
      if (r.condition(answers[i])) {
        risksHtml += `
          <div class="result">
            <h3>${r.text}</h3>
            <div class="incident">${r.incident}</div>
          </div>
        `;
      }
    });
  });

  el.innerHTML = `
    <div class="result">
      <h2>Security Score: ${pct}% <span class="risk ${gradeClass}">${grade}</span></h2>
      <p>${summary}</p>
    </div>

    ${risksHtml || '<div class="result"><h3>No critical vulnerabilities detected</h3><p>Your setup addresses the major known risks.</p></div>'}

    <div class="cta">
      <h3>${pct < 50 ? 'Fix these vulnerabilities now' : 'Strengthen your setup'}</h3>
      <p>cc-safe-setup installs 688 safety hooks in one command — including guards for every vulnerability above.</p>
      <pre style="background:#0d1117;padding:.5rem;border-radius:4px;margin:.5rem 0"><code>npx cc-safe-setup</code></pre>
    </div>

    <div class="cta" style="margin-top:.8rem">
      <h3>Token consumption is a security issue too</h3>
      <p>${pct < 50 ? 'Uncontrolled token consumption burned £140 in one night. The Token Book covers hook-based guards that prevent token waste automatically.' : 'Even with good security, unoptimized token usage costs you. The Token Book has 10 chapters of optimization techniques with copy-paste templates.'}</p>
      <a href="https://zenn.dev/yurukusa/books/token-savings-guide?utm_source=security-checkup&utm_medium=tool&utm_campaign=token-book" class="btn" style="background:#2563eb">Token Book — ¥2,500</a>
      <a href="token-book.html#en" class="btn-outline">Details (Ch.1 Free)</a>
    </div>

    <div class="cta" style="margin-top:.8rem">
      <h3>Also check your token efficiency</h3>
      <a href="token-checkup.html" class="btn-outline">Token Checkup (Free) →</a>
      <a href="claudemd-analyzer.html" class="btn-outline">CLAUDE.md Analyzer →</a>
    </div>
  `;
  el.style.display = 'block';
}

render();
</script>
</body>
